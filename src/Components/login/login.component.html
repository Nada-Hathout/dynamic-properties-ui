<div class="login-page-wrapper vh-100 d-flex justify-content-center align-items-center">
  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>

  <div class="login-card glass-card shadow-2xl p-5 border-0 rounded-5">
    <div class="text-center mb-4">
      <div class="login-icon-box shadow-sm mb-3">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h2 class="fw-bold text-dark mb-1">Welcome Back</h2>
      <p class="text-muted small">Enter your credentials to access the system</p>
    </div>

    <form (ngSubmit)="login()">
      <div class="mb-3">
        <label class="form-label-custom small fw-bold">Username</label>
        <div class="input-group-modern">
          <i class="bi bi-person input-icon"></i>
          <input type="text" class="form-control-modern" 
                 [(ngModel)]="loginData.userName" name="userName" 
                 placeholder="Type your username" required>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label-custom small fw-bold">Password</label>
        <div class="input-group-modern">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" class="form-control-modern" 
                 [(ngModel)]="loginData.password" name="password" 
                 placeholder="••••••••" required>
        </div>
      </div>

      <button class="btn btn-login w-100 mb-3 shadow">
        Login Now <i class="bi bi-arrow-right-short ms-1"></i>
      </button>

      <div class="text-center mt-2">
        <p class="small text-muted mb-0">Don't have an account? 
          <a routerLink="/register" class="register-link fw-bold">Create Account</a>
        </p>
      </div>
    </form>
  </div>
</div>
